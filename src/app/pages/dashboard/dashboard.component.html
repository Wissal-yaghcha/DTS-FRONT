<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Tableau de Bord</h1>
    <p>Vue d'ensemble de votre activite Vente Libre.</p>
  </div>

  <div class="stats-grid">
    <!-- Carte 1 : Terminaux -->
    <div class="stat-card">
      <div class="card-top">
        <div class="icon-wrapper">
          <span class="icon">📦</span> <!-- On remplacera par une vraie icône plus tard -->
        </div>
        <div class="arrow">→</div>
      </div>
      <div class="card-body">
        <h2 class="stat-number">4</h2>
        <h3 class="stat-title">Terminaux en catalogue VLR</h3>
        <p class="stat-desc">Nombre total de terminaux dans le catalogue</p>
      </div>
    </div>

    <!-- Carte 2 : Promotions -->
    <div class="stat-card">
      <div class="card-top">
        <div class="icon-wrapper">
          <span class="icon">🏷️</span>
        </div>
        <div class="arrow">→</div>
      </div>
      <div class="card-body">
        <h2 class="stat-number">2</h2>
        <h3 class="stat-title">Promotions en cours</h3>
        <p class="stat-desc">Terminaux avec une remise active (valeur > 0)</p>
      </div>
    </div>

    <!-- Carte 3 : Actifs -->
    <div class="stat-card">
      <div class="card-top">
        <div class="icon-wrapper">
          <span class="icon">📈</span>
        </div>
        <div class="arrow">→</div>
      </div>
      <div class="card-body">
        <h2 class="stat-number">3</h2>
        <h3 class="stat-title">Terminaux Actifs</h3>
        <p class="stat-desc">Terminaux actuellement actifs dans le catalogue</p>
      </div>
    </div>
  </div>
</div>
